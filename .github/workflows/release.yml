name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (e.g. v0.3.4)"
        required: true
        type: string
      draft:
        description: "Verify an unpublished draft release"
        required: true
        default: true
        type: boolean

permissions: {}

jobs:
  verify-macos-assets:
    permissions:
      # GitHub hides draft releases from read-only workflow tokens. The token is
      # exposed only to the asset download step below.
      contents: write
    if: >-
      github.event_name == 'release' ||
      (endsWith(github.workflow_ref, format('@refs/heads/{0}', github.event.repository.default_branch)) &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-15
            arch: arm64
          - runs-on: macos-15-intel
            arch: amd64
    runs-on: ${{ matrix.runs-on }}
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
    steps:
      - name: Checkout trusted verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'release' && github.event.repository.default_branch || github.workflow_sha }}
          path: trusted
          persist-credentials: false

      - name: Download macOS assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          expected_draft=false
          if [[ "$GITHUB_EVENT_NAME" == workflow_dispatch ]]; then
            expected_draft="${{ inputs.draft }}"
          fi
          trusted/scripts/download-release-assets.sh \
            "$RELEASE_TAG" "${{ matrix.arch }}" "$expected_draft" artifacts

      - name: Verify Developer ID signature
        shell: bash
        run: |
          set -euo pipefail
          version=${RELEASE_TAG#v}
          trusted/scripts/verify-macos-release.sh "$RELEASE_TAG" \
            "artifacts/wacrawl_${version}_darwin_${{ matrix.arch }}.tar.gz"

  update-homebrew-tap:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    needs: verify-macos-assets
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with workflow access to openclaw/homebrew-tap"
            exit 1
          fi

          request_id="wacrawl-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update wacrawl for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo openclaw/homebrew-tap \
            --ref main \
            -f formula=wacrawl \
            -f tag="$RELEASE_TAG" \
            -f repository=openclaw/wacrawl \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="$request_id"

          run_id=""
          for _ in {1..30}; do
            runs_json=$(mktemp)
            if gh run list \
              --repo openclaw/homebrew-tap \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle > "$runs_json"; then
              run_id=$(jq -r --arg title "$expected_title" '.[] | select(.displayTitle == $title) | .databaseId' "$runs_json" | head -n1)
            else
              run_id=""
            fi
            rm -f "$runs_json"
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$run_id" ]; then
            echo "::error::Could not find tap workflow run with title: $expected_title"
            exit 1
          fi

          gh run watch "$run_id" \
            --repo openclaw/homebrew-tap \
            --exit-status \
            --interval 10
